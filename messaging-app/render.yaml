services:
  - type: web
    name: messaging-app
    runtime: python
    env: python
    plan: free
    buildCommand: cd messaging-app && pip install -r requirements.txt
    startCommand: cd messaging-app && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        sync: false          # Set this manually in Render dashboard
      - key: SECRET_KEY
        generateValue: true  # Render will auto-generate a secure random value
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 10080
